<svg width="1000" height="260" viewBox="0 0 1000 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1000" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.48" stop-color="#050816"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="line" x1="120" y1="42" x2="880" y2="205" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#C084FC"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(500 132) rotate(90) scale(190 430)">
      <stop stop-color="#1D4ED8" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" stroke="#1E293B" stroke-width="1" opacity="0.55"/>
    </pattern>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0.5" y="0.5" width="999" height="259" rx="4" fill="url(#bg)" stroke="#1E293B"/>
  <rect x="0.5" y="0.5" width="999" height="259" rx="4" fill="url(#grid)" opacity="0.36"/>
  <rect width="1000" height="260" rx="4" fill="url(#glow)"/>

  <path d="M72 54H218L256 92H365" stroke="url(#line)" stroke-width="1.4" opacity="0.75"/>
  <path d="M928 206H780L742 168H635" stroke="url(#line)" stroke-width="1.4" opacity="0.75"/>
  <path d="M112 205H267L301 171H388" stroke="#22D3EE" stroke-width="1" opacity="0.45"/>
  <path d="M888 54H734L700 88H612" stroke="#C084FC" stroke-width="1" opacity="0.45"/>

  <g filter="url(#softGlow)">
    <circle cx="72" cy="54" r="4" fill="#22D3EE"/>
    <circle cx="928" cy="206" r="4" fill="#C084FC"/>
    <circle cx="500" cy="43" r="3" fill="#67E8F9"/>
    <circle cx="500" cy="217" r="3" fill="#A78BFA"/>
  </g>

  <text x="500" y="62" text-anchor="middle" fill="#67E8F9" font-family="Consolas, Menlo, monospace" font-size="18" font-weight="700" letter-spacing="4">
    GITHUB TELEMETRY
  </text>
  <text x="500" y="126" text-anchor="middle" fill="#F8FAFC" font-family="Segoe UI, Noto Sans SC, Arial, sans-serif" font-size="52" font-weight="800">
    余白 · Yubai
  </text>
  <text x="500" y="160" text-anchor="middle" fill="#CBD5E1" font-family="Segoe UI, Noto Sans SC, Arial, sans-serif" font-size="18" font-weight="500">
    在技术与人文之间做长期记录
  </text>
  <text x="500" y="190" text-anchor="middle" fill="#93C5FD" font-family="Consolas, Menlo, monospace" font-size="14">
    code signals / build trace / open-source pulse
  </text>

  <rect x="332" y="212" width="336" height="1" fill="url(#line)" opacity="0.9"/>
  <rect x="438" y="224" width="124" height="1" fill="url(#line)" opacity="0.5"/>
