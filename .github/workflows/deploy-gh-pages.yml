# 将前端构建产物部署到 GitHub Pages（前后端分离，仅部署静态站点）
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # 若仓库名不是 xxx.github.io，需设置 base 为 /仓库名/
      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES_REPO: ${{ github.event.repository.name }}

      - name: Verify build output
        run: |
          ls -la dist/
          test -f dist/index.html || (echo "Missing dist/index.html" && exit 1)
          test -f dist/404.html || (echo "Missing dist/404.html" && exit 1)

      # 若报错 "Get Pages site failed"，请到 Settings → Pages 将 Source 选为 GitHub Actions
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
